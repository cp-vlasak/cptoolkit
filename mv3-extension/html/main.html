<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" type="text/css" href="../css/external/fontawesome-all.min.css" />
  <style>
    body {
      width: 340px;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      max-height: 500px;
      overflow-y: auto;
    }
    .header {
      background: linear-gradient(135deg, #af282f, #8c2026);
      color: white;
      padding: 12px 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-direction:column;
      text-transform:uppercase;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header img {
      height: 24px;
      width: auto;
    }
    .header-text h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .header-text .version {
      font-size: 11px;
      opacity: 0.9;
      margin-top: 2px;
    }
    .content {
      padding: 15px;
    }
    .status {
      padding: 10px;
      margin: 0 0 10px 0;
      border-radius: 4px;
      font-size: 13px;
    }
    .status.active {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }
    .status.inactive {
      background: #fff3e0;
      color: #b45309;
      border: 1px solid #ffcc80;
    }
    .status.update {
      background: #e3f2fd;
      color: #1565c0;
      border: 1px solid #90caf9;
      cursor: pointer;
      transition: background 0.15s;
    }
    .status.update:hover {
      background: #bbdefb;
    }
    .section {
      margin-top: 10px;
    }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: #af282f;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tools {
      margin-top: 3px;
    }
    .tool {
      padding: 6px 8px;
      margin: 4px 0;
      background: #f5f5f5;
      border-radius: 3px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background-color 0.15s, transform 0.1s;
      user-select: none;
    }
    .tool:hover {
      background: #ebebeb;
    }
    .tool:active {
      transform: scale(0.98);
    }
    .tool.enabled {
      background: #e8f5e9;
    }
    .tool.enabled:hover {
      background: #d7ecd9;
    }
    .tool-status {
      font-size: 10px;
      font-weight: bold;
    }
    .tool-status.on {
      color: #2e7d32;
    }
    .tool-status.off {
      color: #999;
    }
    .tool-open-btn {
      width: auto;
      margin: 0 6px 0 auto;
      padding: 5px 8px;
      background: #fff;
      border: 1px solid #d1d1d1;
      border-radius: 3px;
      color: #666;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
    }
    .tool-open-btn:hover {
      background: rgba(175, 40, 47, 0.1);
      border-color: #af282f;
      color: #af282f;
    }
    .tool-open-btn:focus {
      outline: 2px solid #af282f;
      outline-offset: 1px;
    }
    #tools-container {
    font-size: 16px;
    overflow-y: scroll;
    max-height: 300px;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #af282f;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover {
      background: #8c2026;
    }
    button:focus {
      outline: 2px solid #af282f;
      outline-offset: 2px;
    }
    #tool-mini-ide,
    #tool-custom-css-deployer {
      width: calc(100% - 54px);
      position: relative;
    }
    #tool-mini-ide.enabled,
    #tool-custom-css-deployer.enabled {
      background: #e8f5e9;
    }
    #tool-mini-ide.enabled:hover:not(:has(.tool-snippets-btn:hover)),
    #tool-custom-css-deployer.enabled:hover:not(:has(.tool-snippets-btn:hover)) {
      background: #d7ecd9;
    }
    #tool-mini-ide:hover:not(.enabled):not(:has(.tool-snippets-btn:hover)),
    #tool-custom-css-deployer:hover:not(.enabled):not(:has(.tool-snippets-btn:hover)) {
      background: #ebebeb;
    }
    #tool-mini-ide:has(.tool-snippets-btn:hover),
    #tool-custom-css-deployer:has(.tool-snippets-btn:hover) {
      background: #e8f5e9;
    }
    #tool-mini-ide:not(.enabled):has(.tool-snippets-btn:hover),
    #tool-custom-css-deployer:not(.enabled):has(.tool-snippets-btn:hover) {
      background: #f5f5f5;
    }
    .tool-snippets-btn {
      width: auto;
      margin: 0 auto;
      padding: 7px 7px;
      background: none;
      border: 1px solid #ccc;
      border-radius: 3px;
      color: #555;
      cursor: pointer;
      display: flex;
      float: right;
      align-items: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      position: absolute;
      right: -34px;
    }
    .tool-snippets-btn:hover {
      background: rgba(175, 40, 47, 0.1);
      border-color: #af282f;
      color: #af282f;
    }
    .tool-snippets-btn:focus {
      outline: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../images/wordmark.png" alt="CivicPlus">
    <div class="header-text">
      <h2>Internal Toolkit</h2>
    </div>
  </div>
  
  <div class="content">
    <div id="site-status" class="status"></div>
    <div id="update-status" class="status update" style="display:none;"></div>

    <div id="tools-container">
      <div class="loading">Loading tools...</div>
    </div>
    
    <button id="open-options"><i class="fas fa-cog"></i> Open Settings</button>
  </div>
  
  <script src="../js/popup.js"></script>
</body>
</html>
